name: Dubai Market Intelligence Bot

on:
  schedule:
    # 毎日 UTC 03:00 (日本時間 午後12時) に1回実行トリガー
    # ※共有環境による遅延後、14:00頃の配信を想定
    - cron: '0 3 * * *'
  # GitHub の画面から手動実行もできる
  workflow_dispatch:

jobs:
  market-watch:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.10 をセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install xai-sdk python-dotenv tweepy

      - name: 市場監視スクリプトを実行
        run: python market_watch.py
        # 環境変数は GitHub Secrets から自動注入
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_TO: logistics@kyomirai.com
          GMAIL_RECIPIENTS: "kyomirai.fax@gmail.com,kenji1989kyomirai@gmail.com,yumi1990kyomirai@gmail.com,daiki1991kyomirai@gmail.com,hiroshi1992kyomirai@gmail.com,yuki1993kyomirai@gmail.com,taro1994kyomirai@gmail.com,kei1995kyomirai@gmail.com,nasser1996kyomirai@gmail.com"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
